<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#0a0a0a" />
<title>Homelab Ops</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap"
  rel="stylesheet"
/>
<style>
  :root {
    --bg: #0a0a0a;
    --card: #111111;
    --border: #1e1e1e;
    --accent: #00ff88;
    --warn: #ffaa00;
    --danger: #ff4444;
    --text: #e0e0e0;
    --muted: #555555;
    --data: #ffffff;
    --mono: "JetBrains Mono", ui-monospace, "SFMono-Regular", monospace;
    --sans: "Inter", system-ui, -apple-system, sans-serif;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.4;
    -webkit-font-smoothing: antialiased;
    padding: 16px;
    min-height: 100vh;
  }

  /* ---- Header ------------------------------------------------------ */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    border: 1px solid var(--border);
    background: var(--card);
    border-radius: 8px;
    padding: 14px 18px;
    margin-bottom: 16px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    font-size: 15px;
  }

  .pulse {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.85); }
  }

  .updated {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    text-align: right;
  }
  .updated .count { color: var(--text); }

  /* ---- Grid -------------------------------------------------------- */
  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
  }

  @media (max-width: 720px) {
    .grid { grid-template-columns: 1fr; }
  }

  .panel {
    border: 1px solid var(--border);
    background: var(--card);
    border-radius: 8px;
    padding: 18px;
    min-height: 200px;
  }

  .panel.offline {
    border-color: rgba(255, 68, 68, 0.4);
  }

  .panel-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    padding-bottom: 12px;
    margin-bottom: 16px;
  }

  .panel-host {
    font-family: var(--mono);
    font-weight: 700;
    font-size: 18px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .panel-role { color: var(--muted); font-size: 12px; }

  .status-tag {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    padding: 3px 8px;
    border-radius: 4px;
  }
  .status-tag.online { color: var(--accent); border: 1px solid rgba(0,255,136,0.3); }
  .status-tag.offline { color: var(--danger); border: 1px solid rgba(255,68,68,0.4); }

  /* ---- Metrics ----------------------------------------------------- */
  .metrics { display: flex; flex-direction: column; gap: 12px; }

  .metric {
    display: grid;
    grid-template-columns: 48px 1fr auto;
    align-items: center;
    gap: 12px;
  }

  .metric-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
  }

  .bar {
    height: 8px;
    background: #000;
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    width: 0;
    background: var(--accent);
    transition: width 0.6s ease, background 0.4s ease;
  }

  .metric-value {
    font-family: var(--mono);
    font-weight: 500;
    color: var(--data);
    font-size: 13px;
    min-width: 64px;
    text-align: right;
  }

  /* ---- Temp gauge (signature element) ------------------------------ */
  .gauge-row {
    display: flex;
    align-items: center;
    gap: 18px;
    margin: 4px 0 14px;
  }
  .gauge { position: relative; width: 120px; height: 72px; flex-shrink: 0; }
  .gauge svg { width: 100%; height: 100%; overflow: visible; }
  .gauge-arc-bg { fill: none; stroke: #000; stroke-width: 8; stroke-linecap: round; }
  .gauge-arc-fill {
    fill: none;
    stroke: var(--accent);
    stroke-width: 8;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.8s ease, stroke 0.6s ease;
  }
  .gauge-readout {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    text-align: center;
  }
  .gauge-temp {
    font-family: var(--mono);
    font-weight: 700;
    font-size: 22px;
    color: var(--data);
  }
  .gauge-temp small { font-size: 13px; color: var(--muted); }
  .gauge-caption {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.12em;
  }

  .uptime-block { flex: 1; }
  .uptime-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
  }
  .uptime-value {
    font-family: var(--mono);
    font-weight: 500;
    color: var(--data);
    font-size: 16px;
  }
  .ts-ip {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .ts-ip .dot { color: var(--accent); }
  .ts-ip.down .dot { color: var(--danger); }

  /* ---- Services ---------------------------------------------------- */
  .services-head {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.12em;
    margin: 18px 0 10px;
    border-top: 1px solid var(--border);
    padding-top: 14px;
  }

  .services { display: flex; flex-direction: column; gap: 2px; }

  .service {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 5px 8px;
    border-radius: 4px;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text);
    text-decoration: none;
    transition: background 0.15s ease;
  }
  a.service:hover { background: rgba(255,255,255,0.04); }
  a.service:hover .svc-name { color: var(--accent); }

  .svc-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .svc-dot.running { background: var(--accent); box-shadow: 0 0 6px rgba(0,255,136,0.6); }
  .svc-dot.stopped { background: var(--danger); box-shadow: 0 0 6px rgba(255,68,68,0.5); }

  .svc-name { flex: 1; }
  .svc-port { color: var(--muted); font-size: 11px; }

  /* ---- Network throughput line ------------------------------------- */
  .netline {
    display: flex;
    align-items: center;
    gap: 14px;
    font-family: var(--mono);
    font-size: 12px;
    margin-top: 12px;
  }
  .net-label { color: var(--muted); letter-spacing: 0.08em; }
  .net-down { color: var(--accent); }
  .net-up { color: var(--warn); }

  /* ---- Pi-hole widget ---------------------------------------------- */
  .pihole {
    margin-top: 14px;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    background: #0d0d0d;
  }
  .pihole-head {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.14em;
    margin-bottom: 8px;
  }
  .pihole-stats { display: flex; justify-content: space-between; gap: 8px; }
  .ph-stat { display: flex; flex-direction: column; align-items: flex-start; }
  .ph-num {
    font-family: var(--mono);
    font-weight: 700;
    font-size: 16px;
    color: var(--data);
  }
  .ph-lbl { font-size: 10px; color: var(--muted); letter-spacing: 0.06em; }

  /* ---- Remndrs open count ------------------------------------------ */
  .remndrs {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--warn);
    margin-top: 6px;
  }

  /* ---- Jellyfin now-playing ---------------------------------------- */
  .np {
    margin-top: 14px;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    background: #0d0d0d;
  }
  .np-head {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 0.14em;
    margin-bottom: 8px;
  }
  .np-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--mono);
    font-size: 12px;
    padding: 2px 0;
  }
  .np-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .np-dot.playing { background: var(--accent); box-shadow: 0 0 6px rgba(0,255,136,0.6); }
  .np-dot.paused { background: var(--muted); }
  .np-title {
    flex: 1;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .np-meta { color: var(--muted); font-size: 11px; flex-shrink: 0; }

  /* ---- 24h trend sparklines ---------------------------------------- */
  .trends {
    margin-top: 16px;
    border-top: 1px solid var(--border);
    padding-top: 14px;
  }
  .trends-head {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.12em;
    margin-bottom: 10px;
  }
  .trend {
    display: grid;
    grid-template-columns: 48px 1fr 44px;
    align-items: center;
    gap: 12px;
    margin-bottom: 6px;
  }
  .trend-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
  }
  .spark {
    width: 100%;
    height: 26px;
    display: block;
  }
  .trend-now {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--data);
    text-align: right;
  }
  .spark-empty {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
  }

  .offline-msg {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 48px 0;
    color: var(--danger);
    font-family: var(--mono);
    letter-spacing: 0.16em;
    font-weight: 700;
  }
  .offline-msg .sub {
    color: var(--muted);
    font-weight: 400;
    letter-spacing: 0.04em;
    font-size: 12px;
  }

  footer {
    margin-top: 16px;
    text-align: center;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
  }

  /* ---- WiFi setup panel -------------------------------------------- */
  #wifi:empty { display: none; }
  #wifi { margin-top: 16px; }
  .wifi-panel { max-width: 520px; }
  .wifi-status-box { display: flex; flex-direction: column; gap: 3px; text-align: right; }
  .wifi-current, .wifi-ap {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
  }
  .wifi-current.up, .wifi-ap.up { color: var(--accent); }
  .wifi-current.up .dot, .wifi-ap.up .dot { color: var(--accent); }
  .wifi-current.down .dot, .wifi-ap.down .dot { color: var(--danger); }

  .wifi-tabs { display: flex; gap: 6px; margin-bottom: 14px; }
  .wifi-tab {
    flex: 1;
    background: #000;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.06em;
    padding: 7px 0;
    border-radius: 4px;
    cursor: pointer;
  }
  .wifi-tab.active { color: var(--accent); border-color: var(--accent); }
  .wifi-sub {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
    border-top: 1px solid var(--border);
    padding-top: 10px;
    margin-top: 2px;
  }
  .wifi-field em { color: var(--muted); font-style: normal; opacity: 0.8; }
  .wifi-btn-row { display: flex; gap: 8px; }
  .wifi-btn-row .wifi-btn { flex: 1; }
  .wifi-btn.ghost {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
  }
  .wifi-btn.ghost:hover { border-color: var(--danger); color: var(--danger); opacity: 1; }

  .wifi-mode { display: flex; flex-direction: column; gap: 12px; }
  #wifi-form { display: flex; flex-direction: column; gap: 12px; }
  .wifi-field { display: flex; flex-direction: column; gap: 5px; }
  .wifi-field > span {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
  }
  .wifi-panel input[type="text"],
  .wifi-panel input[type="password"] {
    background: #000;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 9px 10px;
    color: var(--data);
    font-family: var(--mono);
    font-size: 13px;
    width: 100%;
  }
  .wifi-panel input:focus {
    outline: none;
    border-color: var(--accent);
  }
  .wifi-check {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text);
  }
  .wifi-check input[type="checkbox"] { accent-color: var(--accent); width: 15px; height: 15px; }
  .wifi-check input[type="text"] { flex: 1; }
  .wifi-check input:disabled { opacity: 0.4; }

  .wifi-btn {
    background: var(--accent);
    color: #001b0f;
    border: none;
    border-radius: 4px;
    padding: 10px 14px;
    font-family: var(--sans);
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: opacity 0.15s ease;
  }
  .wifi-btn:hover { opacity: 0.85; }
  .wifi-btn:disabled { opacity: 0.5; cursor: default; }

  .wifi-result {
    font-family: var(--mono);
    font-size: 12px;
    min-height: 16px;
    word-break: break-word;
  }
  .wifi-result.pending { color: var(--warn); }
  .wifi-result.ok { color: var(--accent); }
  .wifi-result.err { color: var(--danger); }
</style>
</head>
<body>
  <header>
    <div class="brand"><span class="pulse"></span>HOMELAB OPS</div>
    <div class="updated">
      last updated <span class="count" id="countdown">—</span>
    </div>
  </header>

  <div class="grid" id="grid"></div>

  <div id="wifi"></div>

  <footer>polling every 30s · tailscale-only</footer>

<script>
  // ---- Config --------------------------------------------------------
  // Each node the dashboard should display. `url` is the agent's /stats
  // endpoint; `host` is used to build click-through links to services.
  const ENDPOINTS = [
    { key: "bastion", host: "bastion", url: "http://bastion:9090/stats" },
    { key: "scout",   host: "scout",   url: "http://scout:9090/stats" },
  ];

  const REFRESH_MS = 30000;
  const GAUGE_MIN = 20;   // °C — bottom of the temperature arc
  const GAUGE_MAX = 90;   // °C — top of the temperature arc (critical)

  // ---- Color helpers -------------------------------------------------
  function pctColor(pct) {
    if (pct >= 85) return "var(--danger)";
    if (pct >= 65) return "var(--warn)";
    return "var(--accent)";
  }

  function tempColor(t) {
    if (t == null) return "var(--muted)";
    if (t >= 75) return "var(--danger)";
    if (t >= 60) return "var(--warn)";
    return "var(--accent)";
  }

  // ---- Temperature arc (signature element) ---------------------------
  // Builds a 180° arc as an SVG path. Radius 50, centered at (60,60).
  const ARC_LENGTH = Math.PI * 50; // half-circumference of r=50

  function gaugeSvg(temp) {
    const arcPath = "M 10 60 A 50 50 0 0 1 110 60";
    let offset = ARC_LENGTH;
    let color = "var(--muted)";
    let label = "--";
    if (temp != null) {
      const frac = Math.min(1, Math.max(0, (temp - GAUGE_MIN) / (GAUGE_MAX - GAUGE_MIN)));
      offset = ARC_LENGTH * (1 - frac);
      color = tempColor(temp);
      label = Math.round(temp);
    }
    return `
      <div class="gauge">
        <svg viewBox="0 0 120 70">
          <path class="gauge-arc-bg" d="${arcPath}" />
          <path class="gauge-arc-fill" d="${arcPath}"
                stroke="${color}"
                stroke-dasharray="${ARC_LENGTH}"
                stroke-dashoffset="${offset}" />
        </svg>
        <div class="gauge-readout">
          <div class="gauge-temp">${label}<small>°C</small></div>
          <div class="gauge-caption">CPU TEMP</div>
        </div>
      </div>`;
  }

  // ---- Rendering -----------------------------------------------------
  function metricRow(label, pct, valueText) {
    const color = pctColor(pct);
    const width = Math.min(100, Math.max(0, pct));
    return `
      <div class="metric">
        <span class="metric-label">${label}</span>
        <div class="bar"><div class="bar-fill" style="width:${width}%;background:${color}"></div></div>
        <span class="metric-value">${valueText}</span>
      </div>`;
  }

  // ---- Formatting helpers --------------------------------------------
  function fmtRate(bps) {
    if (bps == null) return "—";
    if (bps < 1024) return bps + " B/s";
    if (bps < 1048576) return (bps / 1024).toFixed(1) + " KB/s";
    return (bps / 1048576).toFixed(2) + " MB/s";
  }

  function fmtNum(n) {
    if (n == null) return "—";
    return n.toLocaleString();
  }

  // ---- Sparklines (24h trends) ---------------------------------------
  function sparkline(values, color, lo, hi) {
    const data = (values || []).filter((v) => v != null && !isNaN(v));
    if (data.length < 2) return '<span class="spark-empty">collecting…</span>';
    const W = 100, H = 26;
    const min = lo != null ? lo : Math.min(...data);
    const max = hi != null ? hi : Math.max(...data);
    const span = max - min || 1;
    const pts = data
      .map((v, i) => {
        const x = (i / (data.length - 1)) * W;
        const y = H - ((v - min) / span) * H;
        return `${x.toFixed(1)},${y.toFixed(1)}`;
      })
      .join(" ");
    return `<svg class="spark" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
        <polyline points="${pts}" fill="none" stroke="${color}"
                  stroke-width="1.5" vector-effect="non-scaling-stroke" />
      </svg>`;
  }

  function trendRow(label, spark, last) {
    return `
      <div class="trend">
        <span class="trend-label">${label}</span>
        ${spark}
        <span class="trend-now">${last}</span>
      </div>`;
  }

  function trendsBlock(history) {
    const h = history || {};
    const hasData = (h.cpu || []).filter((v) => v != null).length >= 2;
    if (!hasData) {
      return `<div class="trends-head">24H TRENDS</div>
              <div class="spark-empty">collecting data…</div>`;
    }
    const lastOf = (a) => {
      const f = (a || []).filter((v) => v != null);
      return f.length ? f[f.length - 1] : null;
    };
    return `
      <div class="trends-head">24H TRENDS</div>
      ${trendRow("CPU", sparkline(h.cpu, "var(--accent)", 0, 100),
          lastOf(h.cpu) != null ? Math.round(lastOf(h.cpu)) + "%" : "—")}
      ${trendRow("TEMP", sparkline(h.temp, "var(--warn)"),
          lastOf(h.temp) != null ? Math.round(lastOf(h.temp)) + "°" : "—")}
      ${trendRow("RAM", sparkline(h.ram, "#3aa0ff", 0, 100),
          lastOf(h.ram) != null ? Math.round(lastOf(h.ram)) + "%" : "—")}`;
  }

  // ---- Network throughput line ---------------------------------------
  function netLine(net) {
    if (net.rx_bytes_sec == null && net.tx_bytes_sec == null) return "";
    return `
      <div class="netline">
        <span class="net-label">NET</span>
        <span class="net-down">↓ ${fmtRate(net.rx_bytes_sec)}</span>
        <span class="net-up">↑ ${fmtRate(net.tx_bytes_sec)}</span>
      </div>`;
  }

  // ---- Pi-hole widget ------------------------------------------------
  function piholeBlock(p) {
    if (!p) return "";
    return `
      <div class="pihole">
        <div class="pihole-head">PI-HOLE</div>
        <div class="pihole-stats">
          <div class="ph-stat"><span class="ph-num">${fmtNum(p.queries_today)}</span><span class="ph-lbl">queries</span></div>
          <div class="ph-stat"><span class="ph-num">${fmtNum(p.blocked_today)}</span><span class="ph-lbl">blocked</span></div>
          <div class="ph-stat"><span class="ph-num">${p.blocked_percent}%</span><span class="ph-lbl">of total</span></div>
        </div>
      </div>`;
  }

  // Escape untrusted strings (e.g. Jellyfin media titles) for HTML.
  function esc(s) {
    return String(s == null ? "" : s).replace(/[&<>"']/g, (c) => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
    }[c]));
  }

  // ---- Extra disks (e.g. external SSD) -------------------------------
  function extraDiskRows(disks) {
    return (disks || [])
      .map((d) =>
        metricRow(esc(d.name).toUpperCase(), d.percent,
          `${d.used_gb}/${d.total_gb}G`)
      )
      .join("");
  }

  // ---- Jellyfin now-playing -----------------------------------------
  function jellyfinBlock(items) {
    if (!items || !items.length) return "";
    const rows = items
      .map((it) => `
        <div class="np-item">
          <span class="np-dot ${it.paused ? "paused" : "playing"}"></span>
          <span class="np-title">${esc(it.title)}</span>
          <span class="np-meta">${esc(it.user || "")}${
            it.percent != null ? " · " + Math.round(it.percent) + "%" : ""
          }</span>
        </div>`)
      .join("");
    return `<div class="np"><div class="np-head">▶ NOW PLAYING</div>${rows}</div>`;
  }

  // ---- Remndrs open count -------------------------------------------
  function remndrsLine(n) {
    if (n == null) return "";
    return `<div class="remndrs">▣ ${fmtNum(n)} open reminder${
      n === 1 ? "" : "s"
    }</div>`;
  }

  function serviceRow(c, host) {
    const cls = c.status === "running" ? "running" : "stopped";
    const portTxt = c.port ? `:${c.port}` : "";
    const inner = `
      <span class="svc-dot ${cls}"></span>
      <span class="svc-name">${c.name}</span>
      <span class="svc-port">${portTxt}</span>`;
    if (c.status === "running" && c.port) {
      const href = `http://${host}:${c.port}`;
      return `<a class="service" href="${href}" target="_blank" rel="noopener">${inner}</a>`;
    }
    return `<div class="service">${inner}</div>`;
  }

  function renderPanel(ep, data, history) {
    const net = data.network || {};
    const tsUp = net.tailscale_status === "connected";

    // Prefer the node's Tailscale MagicDNS hostname so service links resolve
    // from anywhere on the tailnet; fall back to the configured host.
    const linkHost = net.tailscale_hostname || ep.host;
    const services = (data.containers || [])
      .map((c) => serviceRow(c, linkHost))
      .join("");

    return `
      <div class="panel">
        <div class="panel-head">
          <div>
            <div class="panel-host">${data.hostname || ep.key}</div>
            <div class="panel-role">${data.role || ""}</div>
          </div>
          <span class="status-tag online">ONLINE</span>
        </div>

        <div class="gauge-row">
          ${gaugeSvg(data.cpu ? data.cpu.temp_celsius : null)}
          <div class="uptime-block">
            <div class="uptime-label">UPTIME</div>
            <div class="uptime-value">${data.uptime || "—"}</div>
            <div class="ts-ip ${tsUp ? "" : "down"}"
                 title="${esc(net.tailscale_ip || "")}">
              <span class="dot">●</span> ${esc(net.tailscale_hostname || net.tailscale_ip || "no tailscale")}
            </div>
            ${remndrsLine(data.remndrs_open)}
          </div>
        </div>

        <div class="metrics">
          ${metricRow("CPU", data.cpu ? data.cpu.percent : 0,
              data.cpu ? `${data.cpu.percent}%` : "—")}
          ${metricRow("RAM", data.ram ? data.ram.percent : 0,
              data.ram ? `${data.ram.used_gb}/${data.ram.total_gb}G` : "—")}
          ${metricRow("DISK", data.disk ? data.disk.percent : 0,
              data.disk ? `${data.disk.used_gb}/${data.disk.total_gb}G` : "—")}
          ${extraDiskRows(data.extra_disks)}
        </div>

        ${netLine(net)}

        ${piholeBlock(data.pihole)}

        ${jellyfinBlock(data.jellyfin)}

        <div class="trends">${trendsBlock(history)}</div>

        <div class="services-head">SERVICES</div>
        <div class="services">${services || '<div class="service"><span class="svc-name" style="color:var(--muted)">no containers</span></div>'}</div>
      </div>`;
  }

  function renderOffline(ep) {
    return `
      <div class="panel offline">
        <div class="panel-head">
          <div>
            <div class="panel-host">${ep.key}</div>
            <div class="panel-role">unreachable</div>
          </div>
          <span class="status-tag offline">OFFLINE</span>
        </div>
        <div class="offline-msg">
          OFFLINE
          <span class="sub">no response from ${ep.url}</span>
        </div>
      </div>`;
  }

  // ---- Polling -------------------------------------------------------
  async function fetchJson(url) {
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), 8000);
    try {
      const res = await fetch(url, { signal: ctrl.signal, cache: "no-store" });
      if (!res.ok) throw new Error("bad status " + res.status);
      return await res.json();
    } finally {
      clearTimeout(timer);
    }
  }

  function historyUrl(ep) {
    return ep.url.replace(/\/stats\b.*$/, "/history?hours=24");
  }

  // ---- WiFi setup panel (built once; survives auto-refresh) ----------
  const DEFAULT_MAC = "80:B9:89:90:7C:CA";

  function buildWifiPanel(ep) {
    const el = document.getElementById("wifi");
    const base = ep.url.replace(/\/stats\b.*$/, "");
    el.dataset.connectUrl = base + "/wifi/connect";
    el.dataset.repeaterUrl = base + "/wifi/repeater";
    el.dataset.stopUrl = base + "/wifi/stop";
    el.innerHTML = `
      <div class="panel wifi-panel">
        <div class="panel-head">
          <div>
            <div class="panel-host">WIFI SETUP</div>
            <div class="panel-role">${esc(ep.key)}</div>
          </div>
          <div class="wifi-status-box">
            <span class="wifi-current" id="wifi-current"></span>
            <span class="wifi-ap" id="wifi-ap"></span>
          </div>
        </div>

        <div class="wifi-tabs">
          <button type="button" class="wifi-tab active" data-mode="client">Client</button>
          <button type="button" class="wifi-tab" data-mode="repeater">Repeater</button>
        </div>

        <form id="wifi-form" class="wifi-mode" data-mode="client" autocomplete="off">
          <label class="wifi-field"><span>SSID</span>
            <input id="wifi-ssid" type="text" placeholder="network name" /></label>
          <label class="wifi-field"><span>USERNAME <em>(enterprise, optional)</em></span>
            <input id="wifi-user" type="text" placeholder="leave blank for normal WPA" /></label>
          <label class="wifi-field"><span>PASSWORD</span>
            <input id="wifi-pass" type="password" placeholder="leave blank if open" /></label>
          <label class="wifi-check">
            <input id="wifi-clone" type="checkbox" checked />
            <span>Clone MAC</span>
            <input id="wifi-mac" type="text" value="${DEFAULT_MAC}" /></label>
          <button id="wifi-connect-btn" type="submit" class="wifi-btn">Connect</button>
          <div id="wifi-result" class="wifi-result"></div>
        </form>

        <form id="wifi-rpt-form" class="wifi-mode" data-mode="repeater" autocomplete="off" hidden>
          <label class="wifi-check wifi-keep">
            <input id="rpt-keep" type="checkbox" checked />
            <span>Keep current upstream connection (recommended)</span></label>
          <div id="rpt-upstream" hidden>
            <div class="wifi-sub">UPSTREAM — the network to repeat</div>
            <label class="wifi-field"><span>SSID</span>
              <input id="rpt-up-ssid" type="text" placeholder="upstream network" /></label>
            <label class="wifi-field"><span>USERNAME <em>(enterprise, optional)</em></span>
              <input id="rpt-up-user" type="text" placeholder="leave blank for normal WPA" /></label>
            <label class="wifi-field"><span>PASSWORD</span>
              <input id="rpt-up-pass" type="password" placeholder="upstream password" /></label>
            <label class="wifi-check">
              <input id="rpt-clone" type="checkbox" checked />
              <span>Clone MAC</span>
              <input id="rpt-mac" type="text" value="${DEFAULT_MAC}" /></label>
          </div>
          <div class="wifi-sub">BROADCAST — your private network</div>
          <label class="wifi-field"><span>SSID</span>
            <input id="rpt-ap-ssid" type="text" placeholder="name to broadcast" /></label>
          <label class="wifi-field"><span>PASSWORD <em>(8-63 chars)</em></span>
            <input id="rpt-ap-pass" type="password" placeholder="broadcast password" /></label>
          <div class="wifi-btn-row">
            <button id="wifi-rpt-btn" type="submit" class="wifi-btn">Start repeater</button>
            <button id="wifi-stop-btn" type="button" class="wifi-btn ghost">Stop</button>
          </div>
          <div id="wifi-rpt-result" class="wifi-result"></div>
        </form>
      </div>`;

    document.getElementById("wifi-form").addEventListener("submit", onWifiSubmit);
    document.getElementById("wifi-rpt-form").addEventListener("submit", onRepeaterSubmit);
    document.getElementById("wifi-stop-btn").addEventListener("click", onRepeaterStop);

    el.querySelectorAll(".wifi-tab").forEach((tab) => {
      tab.addEventListener("click", () => setWifiMode(tab.dataset.mode));
    });
    // Disable each MAC field when its clone box is unchecked.
    [["wifi-clone", "wifi-mac"], ["rpt-clone", "rpt-mac"]].forEach(([c, m]) => {
      const cb = document.getElementById(c), inp = document.getElementById(m);
      cb.addEventListener("change", () => { inp.disabled = !cb.checked; });
    });
    // Show the upstream fields only when NOT keeping the current connection.
    const keep = document.getElementById("rpt-keep");
    const upstream = document.getElementById("rpt-upstream");
    const syncKeep = () => { upstream.hidden = keep.checked; };
    keep.addEventListener("change", syncKeep);
    syncKeep();
  }

  function setWifiMode(mode) {
    const el = document.getElementById("wifi");
    el.querySelectorAll(".wifi-tab").forEach((t) =>
      t.classList.toggle("active", t.dataset.mode === mode));
    el.querySelectorAll(".wifi-mode").forEach((f) => {
      f.hidden = f.dataset.mode !== mode;
    });
  }

  function updateWifiCurrent(wifi) {
    const s = document.getElementById("wifi-current");
    if (s) {
      if (wifi && wifi.connected) {
        s.className = "wifi-current up";
        s.innerHTML = `<span class="dot">●</span> ${esc(wifi.ssid)}` +
          (wifi.ip ? ` · ${esc(wifi.ip)}` : "") +
          (wifi.signal ? ` · ${esc(wifi.signal)}%` : "");
      } else {
        s.className = "wifi-current down";
        s.innerHTML = `<span class="dot">●</span> not connected`;
      }
    }
    const ap = document.getElementById("wifi-ap");
    if (ap) {
      const a = wifi && wifi.ap;
      if (a && a.active) {
        ap.className = "wifi-ap up";
        ap.innerHTML = `<span class="dot">●</span> AP ${esc(a.ssid || "")}` +
          (a.clients != null ? ` · ${esc(a.clients)} client${a.clients === 1 ? "" : "s"}` : "");
      } else if (a) {
        ap.className = "wifi-ap down";
        ap.innerHTML = `<span class="dot">●</span> AP off`;
      } else {
        ap.innerHTML = "";   // no second radio reported
      }
    }
  }

  function syncWifiPanel(ctx) {
    const el = document.getElementById("wifi");
    if (!ctx) { el.innerHTML = ""; return; }   // node gone / no wifi
    if (!document.getElementById("wifi-form")) buildWifiPanel(ctx.ep);
    updateWifiCurrent(ctx.wifi);
  }

  // Shared POST helper for the WiFi actions (nmcli can be slow).
  async function wifiPost(url, body, out, btn, pendingMsg) {
    out.className = "wifi-result pending";
    out.textContent = pendingMsg;
    if (btn) btn.disabled = true;
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), 95000);
    try {
      const res = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
        signal: ctrl.signal,
      });
      const data = await res.json().catch(() => ({}));
      if (res.ok && data.ok) {
        out.className = "wifi-result ok";
        out.textContent = "✓ " + (data.message || "Done");
      } else {
        out.className = "wifi-result err";
        const where = data.stage ? `[${data.stage}] ` : "";
        out.textContent = "✗ " + where + (data.error || ("HTTP " + res.status));
      }
      if (data.status) updateWifiCurrent(data.status);
    } catch (err) {
      out.className = "wifi-result err";
      out.textContent = "✗ " + (err.name === "AbortError" ? "timed out" : err.message);
    } finally {
      clearTimeout(timer);
      if (btn) btn.disabled = false;
    }
  }

  async function onWifiSubmit(e) {
    e.preventDefault();
    const el = document.getElementById("wifi");
    const ssid = document.getElementById("wifi-ssid").value.trim();
    const out = document.getElementById("wifi-result");
    if (!ssid) { out.className = "wifi-result err"; out.textContent = "SSID is required"; return; }
    await wifiPost(el.dataset.connectUrl, {
      ssid,
      username: document.getElementById("wifi-user").value.trim(),
      password: document.getElementById("wifi-pass").value,
      clone_mac: document.getElementById("wifi-clone").checked,
      mac: document.getElementById("wifi-mac").value.trim(),
    }, out, document.getElementById("wifi-connect-btn"), "Connecting…");
  }

  async function onRepeaterSubmit(e) {
    e.preventDefault();
    const el = document.getElementById("wifi");
    const out = document.getElementById("wifi-rpt-result");
    const keep = document.getElementById("rpt-keep").checked;
    const upSsid = document.getElementById("rpt-up-ssid").value.trim();
    const apSsid = document.getElementById("rpt-ap-ssid").value.trim();
    const apPass = document.getElementById("rpt-ap-pass").value;
    if (!keep && !upSsid) { out.className = "wifi-result err"; out.textContent = "Upstream SSID is required"; return; }
    if (!apSsid) { out.className = "wifi-result err"; out.textContent = "Broadcast SSID is required"; return; }
    if (apPass && (apPass.length < 8 || apPass.length > 63)) {
      out.className = "wifi-result err"; out.textContent = "Broadcast password must be 8-63 characters"; return;
    }
    await wifiPost(el.dataset.repeaterUrl, {
      keep_upstream: keep,
      up_ssid: upSsid,
      up_username: document.getElementById("rpt-up-user").value.trim(),
      up_password: document.getElementById("rpt-up-pass").value,
      clone_mac: document.getElementById("rpt-clone").checked,
      mac: document.getElementById("rpt-mac").value.trim(),
      ap_ssid: apSsid,
      ap_password: apPass,
    }, out, document.getElementById("wifi-rpt-btn"), "Starting repeater…");
  }

  async function onRepeaterStop() {
    const el = document.getElementById("wifi");
    await wifiPost(el.dataset.stopUrl, {}, document.getElementById("wifi-rpt-result"),
      document.getElementById("wifi-stop-btn"), "Stopping…");
  }

  async function refresh() {
    const grid = document.getElementById("grid");
    let wifiCtx = null;
    const results = await Promise.all(
      ENDPOINTS.map(async (ep) => {
        try {
          // Stats is required; history is best-effort (older agents lack it).
          const data = await fetchJson(ep.url);
          let history = null;
          try {
            history = await fetchJson(historyUrl(ep));
          } catch (e) {
            history = null;
          }
          // A node that reports a wifi block gets the setup panel.
          if (data.wifi) wifiCtx = { ep, wifi: data.wifi };
          return renderPanel(ep, data, history);
        } catch (e) {
          return renderOffline(ep);
        }
      })
    );
    grid.innerHTML = results.join("");
    syncWifiPanel(wifiCtx);
    lastUpdate = Date.now();
  }

  // ---- Countdown ticker ---------------------------------------------
  let lastUpdate = Date.now();
  function tick() {
    const secs = Math.floor((Date.now() - lastUpdate) / 1000);
    document.getElementById("countdown").textContent = secs + "s ago";
  }

  refresh();
  setInterval(refresh, REFRESH_MS);
  setInterval(tick, 1000);
</script>
</body>
</html>
